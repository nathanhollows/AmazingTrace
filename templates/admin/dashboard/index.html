{{ define "body" }}
<style>
    .container {
        max-width: revert;
    }

    main {
        max-width: 500px;
        float: left;
        width: 500px;
        background: var(--background-color);
        height: 100vh;
        overflow: scroll;
    }

    #map {
        width: calc(100vw - 500px);
        height: 100vh;
        z-index: -1;
        position: absolute;
        top: 0;
        right: 0;
    }

    header {
        display: none;
    }
</style>
<script src='https://api.mapbox.com/mapbox-gl-js/v2.10.0/mapbox-gl.js'></script>
<link href='https://api.mapbox.com/mapbox-gl-js/v2.10.0/mapbox-gl.css' rel='stylesheet' />
<main class="container-fluid">
    <h1>Leaderboard</h1>
    <p hx-get="/time" hx-trigger="load, every 10s, htmx:afterSwap from:#modal" hx-swap="innerHTML"></p>  
    {{ template "flash" . }}
    {{ if eq .clue_count 0 }}
    <div class="alert">
        There are not clues yet. Do you want to <a href="/admin/clues">add clues</a>?
    </div>
    {{ end }}
    {{ if eq .code_count 0 }}
    <div class="alert">
        There are no teams yet. Do you want to <a href="/admin/teams">generate team codes</a>?
    </div>
    {{ else }}
    
    <table>
        <thead>
            <tr>
                <th scope="col"></th>
                <th scope="col">Name</th>
                <th scope="col">Found</th>
            </tr>
        </thead>
        <tbody hx-get="/admin/dashboard/table" hx-trigger="load, every 10s, htmx:afterSwap from:#modal" hx-swap="innerHTML">
            
        </tbody>
    </table>
    
    <!-- Modal -->
    <dialog id="modal">
    </dialog>
    {{ end }}
</main>
<div id='map'></div>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoibmF0aGFuaG9sbG93cyIsImEiOiJjazIzMzRuNHAwMGVnM2lxaGEwbTNwNGQyIn0.vsjlOi_SpKog-zkBxKW0HQ';
const map = new mapboxgl.Map({
container: 'map', // container ID
        style: {
            'version': 8,
            'sources': {
                'raster-tiles': {
                    'type': 'raster',
                    'tiles': [
                        'https://stamen-tiles.a.ssl.fastly.net/watercolor/{z}/{x}/{y}.jpg'
                    ],
                    'tileSize': 256,
                    'attribution':
                        'Map tiles by <a target="_top" rel="noopener" href="http://stamen.com">Stamen Design</a>, under <a target="_top" rel="noopener" href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a>. Data by <a target="_top" rel="noopener" href="http://openstreetmap.org">OpenStreetMap</a>, under <a target="_top" rel="noopener" href="http://creativecommons.org/licenses/by-sa/3.0">CC BY SA</a>'
                }
            },
            'layers': [
                {
                    'id': 'simple-tiles',
                    'type': 'raster',
                    'source': 'raster-tiles',
                    'minzoom': 0,
                    'maxzoom': 22
                }
            ]
        },
center: [-74.5, 40], // starting position [lng, lat]
zoom: 9, // starting zoom
projection: 'globe' // display the map as a 3D globe
});
map.on('style.load', () => {
map.setFog({}); // Set the default atmosphere style
});

    const size = 200;

    // This implements `StyleImageInterface`
    // to draw a pulsing dot icon on the map.
    const pulsingDot = {
        width: size,
        height: size,
        data: new Uint8Array(size * size * 4),

        // When the layer is added to the map,
        // get the rendering context for the map canvas.
        onAdd: function () {
            const canvas = document.createElement('canvas');
            canvas.width = this.width;
            canvas.height = this.height;
            this.context = canvas.getContext('2d');
        },

        // Call once before every frame where the icon will be used.
        render: function () {
            const duration = 1000;
            const t = (performance.now() % duration) / duration;

            const radius = (size / 2) * 0.3;
            const outerRadius = (size / 2) * 0.7 * t + radius;
            const context = this.context;

            // Draw the outer circle.
            context.clearRect(0, 0, this.width, this.height);
            context.beginPath();
            context.arc(
                this.width / 2,
                this.height / 2,
                outerRadius,
                0,
                Math.PI * 2
            );
            context.fillStyle = `rgba(255, 200, 200, ${1 - t})`;
            context.fill();

            // Draw the inner circle.
            context.beginPath();
            context.arc(
                this.width / 2,
                this.height / 2,
                radius,
                0,
                Math.PI * 2
            );
            context.fillStyle = 'rgba(255, 100, 100, 1)';
            context.strokeStyle = 'white';
            context.lineWidth = 2 + 4 * (1 - t);
            context.fill();
            context.stroke();

            // Update this image's data with data from the canvas.
            this.data = context.getImageData(
                0,
                0,
                this.width,
                this.height
            ).data;

            // Continuously repaint the map, resulting
            // in the smooth animation of the dot.
            map.triggerRepaint();

            // Return `true` to let the map know that the image was updated.
            return true;
        }
    };

    map.on('load', () => {
        map.addImage('pulsing-dot', pulsingDot, { pixelRatio: 2 });

        map.addSource('dot-point', {
            'type': 'geojson',
            'data': {
                'type': 'FeatureCollection',
                'features': [
                    {
                        'type': 'Feature',
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [0, 0] // icon position [lng, lat]
                        }
                    }
                ]
            }
        });
        map.addLayer({
            'id': 'layer-with-pulsing-dot',
            'type': 'symbol',
            'source': 'dot-point',
            'layout': {
                'icon-image': 'pulsing-dot'
            }
        });
    });
</script>
<script>
    /*
    * Modal
    *
    * Pico.css - https://picocss.com
    * Copyright 2019-2021 - Licensed under MIT
    */
    
    // Config
    const isOpenClass = 'modal-is-open';
    const openingClass = 'modal-is-opening';
    const closingClass = 'modal-is-closing';
    const animationDuration = 400; // ms
    let visibleModal = null;
    
    
    // Toggle modal
    const toggleModal = event => {
        event.preventDefault();
        const modal = document.getElementById(event.target.getAttribute('data-target'));
        (typeof(modal) != 'undefined' && modal != null)
        && isModalOpen(modal) ? closeModal(modal) : openModal(modal)
    }
    
    // Is modal open
    const isModalOpen = modal => {
        return modal.hasAttribute('open') && modal.getAttribute('open') != 'false' ? true : false;
    }
    
    // Open modal
    const openModal = modal => {
        if (isScrollbarVisible()) {
            document.documentElement.style.setProperty('--scrollbar-width', `${getScrollbarWidth()}px`);
        }
        document.documentElement.classList.add(isOpenClass, openingClass);
        setTimeout(() => {
            visibleModal = modal;
            document.documentElement.classList.remove(openingClass);
        }, animationDuration);
        modal.setAttribute('open', true);
    }
    
    // Close modal
    const closeModal = modal => {
        visibleModal = null;
        document.documentElement.classList.add(closingClass);
        setTimeout(() => {
            document.documentElement.classList.remove(closingClass, isOpenClass);
            document.documentElement.style.removeProperty('--scrollbar-width');
            modal.removeAttribute('open');
        }, animationDuration);
    }
    
    // Close with a click outside
    document.addEventListener('click', event => {
        if (visibleModal != null) {
            const modalContent = visibleModal.querySelector('article');
            const isClickInside = modalContent.contains(event.target);
            !isClickInside && closeModal(visibleModal);
        }
    });
    
    // Close with Esc key
    document.addEventListener('keydown', event => {
        if (event.key === 'Escape' && visibleModal != null) {
            closeModal(visibleModal);
        }
    });
    
    // Get scrollbar width
    const getScrollbarWidth = () => {
        
        // Creating invisible container
        const outer = document.createElement('div');
        outer.style.visibility = 'hidden';
        outer.style.overflow = 'scroll'; // forcing scrollbar to appear
        outer.style.msOverflowStyle = 'scrollbar'; // needed for WinJS apps
        document.body.appendChild(outer);
        
        // Creating inner element and placing it in the container
        const inner = document.createElement('div');
        outer.appendChild(inner);
        
        // Calculating difference between container's full width and the child width
        const scrollbarWidth = (outer.offsetWidth - inner.offsetWidth);
        
        // Removing temporary elements from the DOM
        outer.parentNode.removeChild(outer);
        
        return scrollbarWidth;
    }
    
    // Is scrollbar visible
    const isScrollbarVisible = () => {
        return document.body.scrollHeight > screen.height;
    }
</script>
{{ end }}
