{{ define "fragment" }}
{{ if eq (len .teams) 0 }}
<tr>
    <th colspan="5" style="text-align: center; padding: 2em;">Teams will appear here when they first check in.</th>
</tr>
{{end }}
{{ range $i, $team := .teams }}
<tr>
    <th scope="row">{{ add $i 1 }}</th>
    <td>
        <strong>
            {{ $team.Code }}
        </strong>
    </td>
    <td>
        {{ $team.Name }}
    </td>
    <td>{{ $team.UpdatedAt.Format "3:04 pm" }}</td>
    <td>
        <progress value="{{ $team.Found }}" max="{{ len $team.ClueLog }}"></progress>
    </td>
    <td>
        <button class="contrast" data-target="modal" onClick="toggleModal(event)" hx-get="/admin/teams/inspect/{{ $team.Code }}" hx-target="#modal" hx-swap="innerHTML">
            Inspect
        </button>
    </td>
</tr>
{{ end }}
{{ end }}
